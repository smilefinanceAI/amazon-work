<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ShopDeal India - Best Products on Amazon</title>
    <meta name="description" content="Direct links to best products on Amazon India. One click to buy.">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="header">
        <div class="nav-container">
            <a href="/" class="logo">🛍️ ShopDeal India</a>
            <button class="mobile-menu-btn" onclick="toggleMobileMenu()">☰</button>
            <div class="nav-links" id="navLinks">
                <a href="/">Home</a>
                <a href="#" onclick="scrollToCategory('mobiles')">📱 Mobiles</a>
                <a href="#" onclick="scrollToCategory('laptops')">💻 Laptops</a>
                <a href="#" onclick="scrollToCategory('headphones')">🎧 Headphones</a>
                <a href="#" onclick="scrollToCategory('fashion')">👕 Fashion</a>
            </div>
            <a href="#" class="contact-btn" onclick="scrollToSearch()">🔍 Search</a>
        </div>
    </header>

    <section class="hero">
        <h1>⚡ Best Products on <span class="amazon-orange">Amazon India</span></h1>
        <p>One click to buy - Best prices, genuine products</p>
        
        <div class="search-bar" id="search">
            <input type="text" id="searchInput" placeholder="Search product: iPhone 15, laptop, shoes...">
            <button onclick="searchAndGo()">Buy Now →</button>
        </div>
    </section>

    <!-- Products Grid -->
    <div class="products-section">
        <div class="products-grid" id="productsGrid"></div>
    </div>

    <footer class="footer">
        <div class="footer-grid">
            <div class="footer-col">
                <h4>🛍️ ShopDeal India</h4>
                <p>Store ID: <strong>smileai24-21</strong></p>
            </div>
        </div>
        <div class="copyright">
            <p>© 2024 ShopDeal India | As an Amazon Associate, we earn from qualifying purchases</p>
        </div>
    </footer>

    <script src="js/amazon-products.js"></script>
    <script>
        // Category products mapping
        const categoryProducts = {
            'mobiles': ['iphone-15', 'samsung-s23', 'oneplus-11r', 'pixel-7a', 'iqoo-z7'],
            'laptops': ['macbook-air-m1', 'hp-pavilion-15', 'lenovo-ideapad-3', 'asus-vivobook-15', 'dell-inspiron-15'],
            'headphones': ['airpods-pro-2', 'boat-rockerz-450', 'sony-ch510', 'jbl-tune-510bt', 'noise-air-buds'],
            'fashion': ['nike-runningshoes', 'allen-solly-shirt', 'puma-tshirt-pack', 'levis-jeans', 'fastrack-watch']
        };
        
        // Get all products
        let allProducts = [];
        for (const [category, keys] of Object.entries(categoryProducts)) {
            for (const key of keys) {
                if (productsDatabase[key]) {
                    allProducts.push({ key: key, ...productsDatabase[key] });
                }
            }
        }
        
        // Render products
        function renderProducts(products) {
            const container = document.getElementById('productsGrid');
            if (!container) return;
            
            container.innerHTML = products.map(product => `
                <div class="product-card" onclick="goToProduct('${product.key}')">
                    <div class="product-image">
                        <img src="${product.image}" alt="${product.name}" onerror="this.src='https://m.media-amazon.com/images/I/61default.jpg'">
                    </div>
                    <div class="product-info">
                        <h3 class="product-title">${product.name}</h3>
                        <div class="product-price">${product.price}</div>
                        <div class="product-rating">${'★'.repeat(Math.floor(product.rating))}${'☆'.repeat(5-Math.floor(product.rating))}</div>
                        <button class="buy-btn">Buy on Amazon →</button>
                    </div>
                </div>
            `).join('');
        }
        
        function scrollToCategory(category) {
            const products = categoryProducts[category].map(key => ({ key, ...productsDatabase[key] }));
            renderProducts(products);
            document.getElementById('productsGrid')?.scrollIntoView({ behavior: 'smooth' });
        }
        
        function scrollToSearch() {
            document.getElementById('search')?.scrollIntoView({ behavior: 'smooth' });
        }
        
        function toggleMobileMenu() {
            document.getElementById('navLinks')?.classList.toggle('show');
        }
        
        // Initial render
        renderProducts(allProducts);
    </script>
</body>
</html>
