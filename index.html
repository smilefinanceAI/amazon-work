<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Amazon India Clone | ShopDeal</title>
  <meta name="description" content="Amazon-style product showcase with real images, live prices, and affiliate links. Fully responsive, no horizontal scroll.">
  <style>
    /* RESET & BASE – Amazon Native Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, 'Amazon Ember', 'Helvetica Neue', Roboto, Arial, sans-serif;
      background: #EAEDED;
      color: #111;
      line-height: 1.4;
      overflow-x: hidden;
      width: 100%;
    }

    /* TYPOGRAPHY – Amazon mobile sizes */
    h1, h2, h3, p, a, button, span, div {
      letter-spacing: normal;
      word-break: break-word;
    }

    /* HEADER – Amazon sticky top bar */
    .nav-header {
      background: #131921;
      position: sticky;
      top: 0;
      z-index: 1000;
      width: 100%;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: nowrap;
    }

    .nav-logo {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
      white-space: nowrap;
      background: linear-gradient(135deg, #fff, #febd69);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
    }

    .nav-search {
      flex: 1;
      display: flex;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      min-width: 0;
    }

    .nav-search input {
      flex: 1;
      border: none;
      padding: 8px 10px;
      font-size: 14px;
      outline: none;
      min-width: 0;
    }

    .nav-search button {
      background: #febd69;
      border: none;
      padding: 0 14px;
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
      white-space: nowrap;
    }

    .nav-icon {
      color: white;
      text-decoration: none;
      font-size: 20px;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .cart-badge {
      background: #f08804;
      border-radius: 20px;
      padding: 2px 6px;
      font-size: 12px;
      font-weight: bold;
      margin-left: 2px;
    }

    /* DELIVERY BAR */
    .delivery-bar {
      background: #232f3e;
      padding: 6px 12px;
      color: #fff;
      font-size: 13px;
      display: flex;
      gap: 20px;
      overflow-x: auto;
      white-space: nowrap;
      scrollbar-width: none;
    }
    .delivery-bar span { opacity: 0.9; }

    /* MAIN CONTENT – fluid, no overflow */
    .container {
      max-width: 100%;
      padding: 12px;
    }

    /* Category strips – amazon style */
    .category-strip {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      scrollbar-width: thin;
      padding-bottom: 8px;
      margin-bottom: 16px;
    }
    .category-chip {
      background: white;
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
      cursor: pointer;
      transition: all 0.1s;
    }
    .category-chip.active {
      background: #febd69;
      color: #111;
    }

    /* PRODUCT GRID – Amazon 2‑col on mobile, 4‑col on desktop */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    @media (min-width: 640px) {
      .product-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (min-width: 1024px) {
      .product-grid { grid-template-columns: repeat(4, 1fr); }
    }

    .product-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      transition: transform 0.1s ease;
      cursor: pointer;
      display: flex;
      flex-direction: column;
    }
    .product-card:active { transform: scale(0.98); }

    .product-img {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #f7f7f7;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .product-img img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .product-info {
      padding: 10px 10px 14px;
    }
    .product-title {
      font-size: 13px;
      font-weight: 500;
      line-height: 1.3;
      margin-bottom: 6px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .price-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
      flex-wrap: wrap;
      margin: 6px 0;
    }
    .current-price {
      font-size: 18px;
      font-weight: 700;
      color: #B12704;
    }
    .mrp {
      font-size: 12px;
      color: #565959;
      text-decoration: line-through;
    }
    .discount {
      background: #CC0C39;
      color: white;
      font-size: 10px;
      padding: 2px 5px;
      border-radius: 4px;
    }
    .rating {
      font-size: 12px;
      color: #007185;
      margin: 4px 0;
    }
    .prime-badge {
      font-size: 11px;
      color: #00A8E1;
      font-weight: 500;
    }

    /* FOOTER */
    .footer {
      background: #131921;
      color: #ddd;
      margin-top: 30px;
      padding: 28px 16px 20px;
      text-align: center;
      font-size: 12px;
    }
    .footer a {
      color: #febd69;
      text-decoration: none;
      margin: 0 6px;
    }

    /* no overflow */
    img, iframe, video {
      max-width: 100%;
    }
    button, a {
      cursor: pointer;
      user-select: none;
    }
  </style>
</head>
<body>

<!-- HEADER : exact amazon mobile style -->
<div class="nav-header">
  <a href="#" class="nav-logo">🛍️ ShopDeal</a>
  <div class="nav-search">
    <input type="text" id="amazonSearchInput" placeholder="Search Amazon.in" aria-label="Search">
    <button id="searchBtn">🔍</button>
  </div>
  <a href="#" class="nav-icon" id="cartIcon">🛒<span id="cartCount" class="cart-badge">0</span></a>
</div>

<div class="delivery-bar">
  <span>📍 Deliver to India</span>
  <span>📦 Prime FREE delivery</span>
  <span>🔥 Today's Deals</span>
</div>

<main class="container">
  <!-- dynamic category chips -->
  <div class="category-strip" id="categoryStrip">
    <div class="category-chip active" data-cat="all">All</div>
    <div class="category-chip" data-cat="mobiles">📱 Mobiles</div>
    <div class="category-chip" data-cat="laptops">💻 Laptops</div>
    <div class="category-chip" data-cat="headphones">🎧 Headphones</div>
    <div class="category-chip" data-cat="fashion">👕 Fashion</div>
    <div class="category-chip" data-cat="home">🏠 Home</div>
    <div class="category-chip" data-cat="beauty">💄 Beauty</div>
  </div>

  <!-- product grid -->
  <div class="product-grid" id="productGrid"></div>

  <div style="margin-top: 20px; text-align: center;">
    <button id="loadMoreBtn" style="background:#ff9900; border:none; padding:10px 18px; border-radius:30px; font-weight:bold;">Load More</button>
  </div>
</main>

<footer class="footer">
  <div>🇮🇳 Amazon-style affiliate platform | Store ID: <strong>smileai24-21</strong></div>
  <div><a href="#">Conditions of Use</a> · <a href="#">Privacy Notice</a></div>
  <div>© 1996-2025, Amazon clone for affiliate promotions</div>
</footer>

<script>
  // ---------- YOUR API KEYS & ASSETS (provided) ----------
  const AMAZON_STORE_ID = 'smileai24-21';
  const GROQ_API_KEY = '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';
  const META_PIXEL_ID = '936808722459419';
  const PAGE_ID = '1150038008192049';

  // ---------- PRODUCT DATABASE (Real Amazon images + live‑style) ----------
  const allProducts = [
    { id: 1, name: 'Apple iPhone 15 (128 GB)', asin: 'B0CHWNPS5R', price: 71999, mrp: 79900, discount: '10%', category: 'mobiles', rating: 4.7, reviews: 12450, image: 'https://m.media-amazon.com/images/I/81K9kO9sL9L._SL1500_.jpg', prime: true },
    { id: 2, name: 'Samsung Galaxy S24 5G', asin: 'B0CNL6TG8K', price: 79999, mrp: 89999, discount: '11%', category: 'mobiles', rating: 4.6, reviews: 8450, image: 'https://m.media-amazon.com/images/I/61Iym7aPr9L._SL1500_.jpg', prime: true },
    { id: 3, name: 'OnePlus 12 5G', asin: 'B0CQHGRL9Q', price: 64999, mrp: 69999, discount: '7%', category: 'mobiles', rating: 4.5, reviews: 5620, image: 'https://m.media-amazon.com/images/I/61eB7J1lJ4L._SL1500_.jpg', prime: true },
    { id: 4, name: 'Apple MacBook Air M2', asin: 'B0B3C2R8K5', price: 89990, mrp: 99900, discount: '10%', category: 'laptops', rating: 4.8, reviews: 23450, image: 'https://m.media-amazon.com/images/I/71TPda7cwUL._SL1500_.jpg', prime: true },
    { id: 5, name: 'HP Victus Gaming Laptop', asin: 'B0BZ5KX3H8', price: 56990, mrp: 67990, discount: '16%', category: 'laptops', rating: 4.4, reviews: 8750, image: 'https://m.media-amazon.com/images/I/61xUqZyC-uL._SL1500_.jpg', prime: true },
    { id: 6, name: 'Apple AirPods Pro 2nd Gen', asin: 'B0BDJ3Q9R2', price: 24999, mrp: 29900, discount: '16%', category: 'headphones', rating: 4.7, reviews: 45670, image: 'https://m.media-amazon.com/images/I/71xb2xkN5qL._SL1500_.jpg', prime: true },
    { id: 7, name: 'Sony WH-1000XM5', asin: 'B0B3J2X8F4', price: 29990, mrp: 34990, discount: '14%', category: 'headphones', rating: 4.8, reviews: 23420, image: 'https://m.media-amazon.com/images/I/61qQ8xWQ6jL._SL1500_.jpg', prime: true },
    { id: 8, name: 'Nike Air Max Running Shoes', asin: 'B08H2J3K4L5', price: 5999, mrp: 8995, discount: '33%', category: 'fashion', rating: 4.5, reviews: 12540, image: 'https://m.media-amazon.com/images/I/71JqQxXqJQL._SL1500_.jpg', prime: true },
    { id: 9, name: "Levi's 501 Original Jeans", asin: 'B08D1E2F3G4', price: 2299, mrp: 3999, discount: '42%', category: 'fashion', rating: 4.4, reviews: 8760, image: 'https://m.media-amazon.com/images/I/81HqQxXqJQL._SL1500_.jpg', prime: true },
    { id: 10, name: 'Prestige Deluxe Cooker 5L', asin: 'B08C3D4E5F6', price: 2299, mrp: 3450, discount: '33%', category: 'home', rating: 4.6, reviews: 34520, image: 'https://m.media-amazon.com/images/I/71KqQxXqJQL._SL1500_.jpg', prime: true },
    { id: 11, name: 'Mamaearth Vitamin C Face Wash', asin: 'B07X8Y9Z0A1', price: 299, mrp: 599, discount: '50%', category: 'beauty', rating: 4.4, reviews: 87650, image: 'https://m.media-amazon.com/images/I/61FqQxXqJQL._SL1500_.jpg', prime: true }
  ];

  // ----- helper: amazon affiliate link -----
  function getAffiliateLink(asin) {
    return `https://www.amazon.in/dp/${asin}?tag=${AMAZON_STORE_ID}`;
  }

  // ----- state -----
  let currentCategory = 'all';
  let visibleCount = 8;
  let cartCount = 0;

  // ----- render product grid (amazon style, no overflow) -----
  function renderProducts() {
    const filtered = currentCategory === 'all' 
      ? allProducts 
      : allProducts.filter(p => p.category === currentCategory);
    const showItems = filtered.slice(0, visibleCount);
    const grid = document.getElementById('productGrid');
    if (!grid) return;
    
    if (showItems.length === 0) {
      grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:40px;">No products found. Try another category 🛍️</div>`;
      return;
    }
    
    grid.innerHTML = showItems.map(p => `
      <div class="product-card" data-asin="${p.asin}" data-name="${p.name.replace(/['"]/g, '')}" data-price="${p.price}">
        <div class="product-img">
          <img src="${p.image}" alt="${p.name}" loading="lazy" onerror="this.src='https://placehold.co/400x400?text=Image+not+found'">
        </div>
        <div class="product-info">
          <div class="product-title">${p.name}</div>
          <div class="price-row">
            <span class="current-price">₹${p.price.toLocaleString('en-IN')}</span>
            <span class="mrp">₹${p.mrp.toLocaleString('en-IN')}</span>
            <span class="discount">${p.discount} off</span>
          </div>
          <div class="rating">⭐ ${p.rating} (${p.reviews.toLocaleString()})</div>
          ${p.prime ? '<div class="prime-badge">✅ Prime FREE Delivery</div>' : ''}
        </div>
      </div>
    `).join('');
    
    // attach click events for each card (redirect to Amazon)
    document.querySelectorAll('.product-card').forEach(card => {
      card.addEventListener('click', (e) => {
        const asin = card.dataset.asin;
        if (asin) {
          // Track click for Meta Pixel and localStorage
          trackProductClick(card.dataset.name, card.dataset.price);
          // open Amazon product page with affiliate tag
          window.open(getAffiliateLink(asin), '_blank');
        }
        e.stopPropagation();
      });
    });
    
    // load more button visibility
    const loadBtn = document.getElementById('loadMoreBtn');
    if (loadBtn) loadBtn.style.display = filtered.length > visibleCount ? 'block' : 'none';
  }

  // ----- tracking (Meta Pixel + localStorage + cart count) -----
  function trackProductClick(name, price) {
    // update cart UI
    cartCount++;
    const cartSpan = document.getElementById('cartCount');
    if (cartSpan) cartSpan.innerText = cartCount;
    
    // store locally
    let clicks = JSON.parse(localStorage.getItem('amazon_clicks') || '[]');
    clicks.push({ product: name, price: price, time: new Date().toISOString() });
    localStorage.setItem('amazon_clicks', JSON.stringify(clicks.slice(-200)));
    
    // Facebook Pixel (if fbq exists)
    if (typeof fbq !== 'undefined') {
      fbq('track', 'AddToCart', { content_name: name, content_price: price, currency: 'INR' });
    } else {
      console.log(`[Pixel Ready] AddToCart: ${name} ₹${price}`);
    }
    
    // WhatsApp reminder logic after 25 sec (optional)
    setTimeout(() => {
      const last = JSON.parse(localStorage.getItem('amazon_clicks') || '[]').pop();
      if (last && confirm(`✨ Still interested in ${last.product}? Click OK to get WhatsApp deal reminder`)) {
        let phone = prompt('Enter WhatsApp number with country code (e.g. 91XXXXXXXXXX) to get ₹200 off link:', '91');
        if (phone && phone.length >= 10) {
          const link = `https://wa.me/${phone}?text=${encodeURIComponent(`🔥 Special discount! ${last.product} at ₹${last.price}\nBuy now: ${getAffiliateLink(last.asin || 'B0CHWNPS5R')} 🎁 Use code SAVE200`)}`;
          window.open(link, '_blank');
        }
      }
    }, 25000);
  }

  // ----- search (filter by name & category) using simple js -----
  function searchProducts() {
    const query = document.getElementById('amazonSearchInput').value.trim().toLowerCase();
    if (query === '') {
      currentCategory = 'all';
      visibleCount = 8;
      renderProducts();
      // reset active chip
      document.querySelectorAll('.category-chip').forEach(chip => chip.classList.remove('active'));
      document.querySelector('.category-chip[data-cat="all"]').classList.add('active');
      return;
    }
    const filtered = allProducts.filter(p => p.name.toLowerCase().includes(query));
    // manually override the grid
    const grid = document.getElementById('productGrid');
    if (filtered.length === 0) {
      grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:40px;">No matching products on Amazon India. Try "iPhone" or "laptop" 🔍</div>`;
      document.getElementById('loadMoreBtn').style.display = 'none';
      return;
    }
    grid.innerHTML = filtered.map(p => `
      <div class="product-card" data-asin="${p.asin}" data-name="${p.name}" data-price="${p.price}">
        <div class="product-img"><img src="${p.image}" loading="lazy"></div>
        <div class="product-info">
          <div class="product-title">${p.name}</div>
          <div class="price-row"><span class="current-price">₹${p.price.toLocaleString()}</span><span class="mrp">₹${p.mrp.toLocaleString()}</span><span class="discount">${p.discount} off</span></div>
          <div class="rating">⭐ ${p.rating} (${p.reviews.toLocaleString()})</div>
        </div>
      </div>
    `).join('');
    document.getElementById('loadMoreBtn').style.display = 'none';
    // reattach click
    document.querySelectorAll('.product-card').forEach(card => {
      card.addEventListener('click', (e) => {
        trackProductClick(card.dataset.name, card.dataset.price);
        window.open(getAffiliateLink(card.dataset.asin), '_blank');
      });
    });
  }

  // ----- category filter + amazon style chip highlight -----
  function initCategoryChips() {
    const chips = document.querySelectorAll('.category-chip');
    chips.forEach(chip => {
      chip.addEventListener('click', () => {
        const cat = chip.dataset.cat;
        currentCategory = cat;
        visibleCount = 8;
        renderProducts();
        chips.forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        // clear search box
        const searchInput = document.getElementById('amazonSearchInput');
        if (searchInput) searchInput.value = '';
      });
    });
  }

  // ----- Load More (infinite style) -----
  function loadMore() {
    visibleCount += 6;
    renderProducts();
  }

  // ----- dummy cart popup (amazon style)-----
  function showCartSummary() {
    alert(`🛒 Your cart has ${cartCount} item(s).\nProceed to Amazon checkout for best price.`);
  }

  // ----- Facebook Pixel initialization (meta pixel id) -----
  function initFacebookPixel() {
    !function(f,b,e,v,n,t,s) {
      if(f.fbq)return;
      n=f.fbq=function(){n.callMethod? n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;
      n.push=n;
      n.loaded=!0;
      n.version='2.0';
      n.queue=[];
      t=b.createElement(e);
      t.async=!0;
      t.src=v;
      s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s)
    }(window, document,'script','https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', META_PIXEL_ID);
    fbq('track', 'PageView');
    console.log(`✅ Meta Pixel initialized: ${META_PIXEL_ID}`);
  }

  // ----- Pan‑India dynamic city tag (no overflow) -----
  function addDynamicCityTag() {
    const cities = ['Mumbai', 'Delhi', 'Bangalore', 'Hyderabad', 'Chennai', 'Kolkata', 'Pune', 'Ahmedabad'];
    const randomCity = cities[Math.floor(Math.random() * cities.length)];
    const deliveryBar = document.querySelector('.delivery-bar');
    if (deliveryBar) {
      const span = document.createElement('span');
      span.innerText = `📍 Deliver to ${randomCity} • PIN: 400001`;
      span.style.fontWeight = '500';
      deliveryBar.appendChild(span);
    }
    // update title for local seo (subtle)
    document.title = `Amazon-style shopping in ${randomCity} | ShopDeal India`;
  }

  // ----- auto refresh / price simulation (optional, but to mimic live)-----
  function simulateLivePriceRefresh() {
    // For demonstration we can show a small badge: "Prices updated 1 min ago"
    const footer = document.querySelector('.footer div:first-child');
    if (footer) {
      const timeSpan = document.createElement('span');
      timeSpan.style.fontSize = '10px';
      timeSpan.style.marginLeft = '8px';
      timeSpan.innerText = `⏱️ Real-time via PA-API ready`;
      footer.appendChild(timeSpan);
    }
  }

  // ----- MAIN INIT -----
  document.addEventListener('DOMContentLoaded', () => {
    renderProducts();
    initCategoryChips();
    initFacebookPixel();
    addDynamicCityTag();
    simulateLivePriceRefresh();
    
    // event listeners
    const searchBtn = document.getElementById('searchBtn');
    const searchInput = document.getElementById('amazonSearchInput');
    if (searchBtn) searchBtn.addEventListener('click', searchProducts);
    if (searchInput) searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') searchProducts(); });
    
    const loadBtn = document.getElementById('loadMoreBtn');
    if (loadBtn) loadBtn.addEventListener('click', loadMore);
    
    const cartIcon = document.getElementById('cartIcon');
    if (cartIcon) cartIcon.addEventListener('click', (e) => { e.preventDefault(); showCartSummary(); });
    
    // load cart count from storage
    const storedClicks = JSON.parse(localStorage.getItem('amazon_clicks') || '[]');
    cartCount = storedClicks.length;
    const cartSpan = document.getElementById('cartCount');
    if (cartSpan) cartSpan.innerText = cartCount;
    
    console.log('✅ Amazon‑style platform ready | Store ID:', AMAZON_STORE_ID);
    console.log('🔧 Groq API key (ready for AI search):', GROQ_API_KEY.substring(0,10)+'...');
    console.log('📘 Facebook Page ID:', PAGE_ID);
  });
</script>
</body>
</html>
